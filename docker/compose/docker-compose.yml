version: "3.8"
services:
  mios:
    image: "10.162.15.39/mios"
    environment:
      - verbosity=trace
      - database_port=27005
    network_mode: "host"
    cap_add:
      - SYS_NICE
    depends_on:
      - "ros"
      - "mongo"
  ros:
    image: "ros:noetic-ros-core"
    network_mode: "host"
    command: roscore
  mongo:
    image: "mongo:4.4.6"
    ports:
      - "27005:27017"
