services:
  mios:
    image: "mirmi/mios:FR3"
    restart: always
    environment:
      - ROBOT_IP=192.168.3.100
      - ROBOT_USER=MBZUAI
      - ROBOT_PASSWORD=mbzuai123
      - MONGONAME=miosL
      - verbosity=debug
      - database_port=27017
      - robot_config=0
      - robot_arm=left
    network_mode: "host"
    cap_add:
      - SYS_NICE
    depends_on:
      - "mongo"
  mongo:
    image: "mongo:4.4.6"
    ports:
      - "27017:27017"
    volumes:
      - ./localFolder:/data/db
    command: mongod --quiet --logpath /dev/null 

  mios_mls:
    image: "mirmi/mios_mls:dualarm"
    ports:
      - "8000:8000"
      - "8001:8001"
    network_mode: "host"
    cap_add:
      - SYS_NICE



