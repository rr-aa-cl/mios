version: "3.8"
services:
  mios:
    image: "msrm/mios:release"
    environment:
      - output=debug
      - database_port=27005
    network_mode: "host"
    cap_add:
      - SYS_NICE
    ports:
      - "12000:12000"
      - "12001:12001"
      - "12002:12002"
      - "8888:8888"
      - "8889:8889"
  ros:
    image: "ros:melodic-ros-core"
    network_mode: "host"
    command: roscore
