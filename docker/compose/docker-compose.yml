version: "3.8"
services:
  mios:
    image: "mirmi/mios:latest"
    restart: always
    environment:
      - verbosity=info
      - database_port=27005
      - robot_config=0
      - robot_arm=left
    network_mode: "host"
    cap_add:
      - SYS_NICE
    depends_on:
      - "ros"
      - "mongo"
  miosR:
    image: "mirmi/mios:latest"
    restart: always
    environment:
      - verbosity=info
      - database_port=27005
      - robot_config=1
      - robot_arm=right
    network_mode: "host"
    cap_add:
      - SYS_NICE
    depends_on:
      - "ros"
      - "mongo"      
  #ros:
  #  image: "ros:noetic-ros-core"
  #  network_mode: "host"
  #  command: roscore
  mongo:
    image: "mongo:4.4.6"
    ports:
      - "27005:27017"
    volumes:
      - ./localFolder:/data/db

