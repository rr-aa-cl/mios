name: Docker Build

permissions:
  contents: read
  packages: write

on:
  push:
    branches:
      - build
  pull_request:
    branches:
      - build

jobs:
  build:
    runs-on: ubuntu-latest
    container: 
      image: ghcr.io/ciai-engineering/mios/mios_build:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: install dependencies
        run: |
          cd $GITHUB_WORKSPACE/docker
          ls -al
          bash core_dep.sh
      
      - name: Upload workspace
        uses: actions/upload-artifact@v4
        with:
          name: workspace
          path: .

  build_images:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download workspace
        uses: actions/download-artifact@v4
        with:
          name: workspace

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
  

      - name: Build mios Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/core/Dockerfile
          push: false
          tags: ghcr.io/${{ github.repository }}/mios:test

      - name: Build mios_mls Docker image
        uses: docker/build-push-action@v5
        with:
            context: .
            file: ./docker/ml_service/Dockerfile
            push: false
            tags: ghcr.io/${{ github.repository }}/mios_mls:test

  