name: Docker Build

permissions:
  contents: read
  packages: write

on:
  push:
    branches:
      - dev_dependencies
      - local_dev
  pull_request:
    branches:
      - local_dev

jobs:
  lint_python:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install lint dependencies
        run: pip install ruff

      - name: Lint python directory
        run: ruff check python

  build_builder:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # - name: Set up Docker Buildx
      #   uses: docker/setup-buildx-action@v3

      # - name: Log in to GitHub Container Registry
      #   uses: docker/login-action@v3
      #   with:
      #     registry: ghcr.io
      #     username: ${{ github.actor }}
      #     password: ${{ secrets.GITHUB_TOKEN }}
  

      # - name: Build mios builder Docker image
      #   uses: docker/build-push-action@v5
      #   with:
      #     context: .
      #     file: ./docker/mios_builder/Dockerfile
      #     push: true
      #     tags: |
      #       ghcr.io/${{ github.repository }}/mios_builder:${{ github.sha }}
      #       ghcr.io/${{ github.repository }}/mios_builder:${{ github.head_ref || github.ref_name }}



  build:
    needs: build_builder
    runs-on: ubuntu-latest
    container: 
      image: ghcr.io/rr-aa-cl/mios/mios_builder:builder
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: install dependencies
        run: |
          cd $GITHUB_WORKSPACE/docker
          ls -al
          bash core_dep.sh
      
      - name: Upload workspace
        uses: actions/upload-artifact@v4
        with:
          name: workspace
          path: .

  build_images:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download workspace
        uses: actions/download-artifact@v4
        with:
          name: workspace

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
  
      - name: Extract metadata for Docker images
        id: meta-mios
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository }}/mios
          tags: |
            type=ref,event=branch
            type=ref,event=branch,suffix=-{{sha}}-{{date 'YYMMDDHHmmss' tz='Asia/Dubai'}}
            type=ref,event=tag
            type=ref,event=pr,suffix=-{{sha}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
          flavor: |
            latest=${{ github.ref == 'refs/heads/local_dev' }}
      
      - name: Extract metadata for Docker images
        id: meta-mios-mls
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository }}/mios_mls
          tags: |
            type=ref,event=branch
            type=ref,event=branch,suffix=-{{sha}}-{{date 'YYMMDDHHmmss' tz='Asia/Dubai'}}
            type=ref,event=tag
            type=ref,event=pr,suffix=-{{sha}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
          flavor: |
            latest=${{ github.ref == 'refs/heads/local_dev' }}

      - name: Build mios Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/core/Dockerfile
          push: true
          tags: ${{ steps.meta-mios.outputs.tags }}


      - name: Build mios_mls Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/ml_service/Dockerfile
          push: true
          tags: ${{ steps.meta-mios-mls.outputs.tags }}

  
