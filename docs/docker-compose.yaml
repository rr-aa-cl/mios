version: "3.8"
services:
  mios:
    image: "mirmi/mios:0.15.0"
    restart: always
    environment:
      - verbosity=info
      - database_port=27017
      - robot_config=0
      - robot_arm=left
    network_mode: "host"
    cap_add:
      - SYS_NICE
    depends_on:
      - "mongo"
  mongo:
    image: "mongo:7.0.14"
    ports:
      - "27017:27017"
    volumes:
      - ./localFolder:/data/db
    command: mongod --quiet --logpath /dev/null 

  mios_mls:
    image: "mirmi/mios_mls:latest"
    ports:
      - "8000:8000"
      - "8001:8001"